name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    env:
      # Windows' schannel + cargo HTTP/2 flakes on crates.io downloads
      # ([56] missing close_notify); HTTP/1.1 plus more retries avoids it.
      CARGO_NET_RETRY: '10'
      CARGO_HTTP_MULTIPLEXING: 'false'
    steps:
      - uses: actions/checkout@v4

      # webkit2gtk 4.1 is Tauri v2's webview; libssl-dev covers suppaftp's native-tls.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf build-essential libssl-dev libayatana-appindicator3-dev

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Runs the Rust tests AND regenerates src/bindings.ts (gitignored), which the
      # frontend type-check and tests below depend on.
      - name: Rust tests + generate bindings
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Frontend tests
        run: bun run test:run
