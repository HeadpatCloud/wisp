name: release

# Push a tag like `v0.1.0` to publish a release, or run manually from the Actions tab
# (manual runs tag the release from the version in tauri.conf.json).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    env:
      # Windows' schannel + cargo HTTP/2 flakes on crates.io downloads
      # ([56] missing close_notify); HTTP/1.1 plus more retries avoids it.
      CARGO_NET_RETRY: '10'
      CARGO_HTTP_MULTIPLEXING: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf build-essential libssl-dev libayatana-appindicator3-dev file

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Release builds skip the debug-only bindings export, so generate src/bindings.ts here
      # before tauri build runs the frontend `tsc && vite build`.
      - name: Generate typed IPC bindings
        run: cargo test --manifest-path src-tauri/Cargo.toml export_bindings

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'wisp-v__VERSION__' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Wisp v__VERSION__' }}
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
